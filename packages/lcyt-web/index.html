<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>lcyt-web — Live Captions for YouTube</title>
  <!-- PWA / installability (disabled) -->
  <!-- Manifest and service worker removed during development -->
  <meta name="theme-color" content="#1c2128" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="LCYT" />

  <link rel="icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <!-- Apply saved theme before first paint to avoid flash -->
  <script>
    (function() {
      try {
        var t = localStorage.getItem('lcyt-theme');
        if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
        else if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
      } catch(e) {}
    })();
  </script>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.jsx"></script>
  <!-- Service worker registration removed -->
</body>
</html>
