version: '3.8'

services:
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: docker-socket-proxy
    restart: unless-stopped
    ports:
      - "2375:2375"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  lcyt-ffmpeg:
    build:
      context: ./images/lcyt-ffmpeg
    image: lcyt-ffmpeg:local
    container_name: lcyt-ffmpeg
    restart: unless-stopped
    volumes:
      - cea-pipes:/var/cea-pipes

  lcyt-backend:
    image: lcyt-backend:latest
    container_name: lcyt-backend
    depends_on:
      - docker-socket-proxy
      - lcyt-ffmpeg
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Use the docker runner so the backend launches ffmpeg containers
      - FFMPEG_RUNNER=docker
      # Backend will use the socket-proxy to talk to the Docker daemon
      - DOCKER_HOST=http://docker-socket-proxy:2375
      # Directory inside backend container mapped to the named volume
      - CEA_PIPES_DIR=/var/cea-pipes
    volumes:
      - cea-pipes:/var/cea-pipes

volumes:
  cea-pipes:
    driver: local

# Notes:
# - This compose file is a minimal development setup. In production run the
#   socket-proxy with appropriate network/security controls and do NOT expose
#   the Docker API to untrusted networks.
# - The lcyt-backend image shown above is a placeholder. Replace with your
#   built backend image (local tag or registry path) as needed.
services:
  # LCYT API (3000) and MCP server (3001)
  # (frontend is served as static files separately by nginx)
  lcyt-site:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        RTMP_RELAY_ACTIVE: ${RTMP_RELAY_ACTIVE:-0}
        GRAPHICS_ENABLED: ${GRAPHICS_ENABLED:-0}
        APT_MIRROR: ${APT_MIRROR:-}
    image: lcyt-site:latest
    ports:
      - "127.0.0.1:3000:3000"
      - "127.0.0.1:3001:3001"
    environment:
      RTMP_RELAY_ACTIVE: ${RTMP_RELAY_ACTIVE:-0}
      JWT_SECRET: ${JWT_SECRET}
      DB_PATH: /data/lcyt.sqlite
      FREE_APIKEY_ACTIVE: ${FREE_APIKEY_ACTIVE:-0}
      MCP_REQUIRE_API_KEY: ${MCP_REQUIRE_API_KEY:-0}
      ADMIN_KEY: ${ADMIN_KEY:-}
      ALLOWED_DOMAINS: ${ALLOWED_DOMAINS:-app.lcyt.fi,localhost}
      USAGE_PUBLIC: ${USAGE_PUBLIC:-}
      STATIC_DIR: ${STATIC_DIR:-}
      GRAPHICS_ENABLED: ${GRAPHICS_ENABLED:-0}
      LCYT_WEB_URL: ${LCYT_WEB_URL:-}
      SPEECH_PUBLIC_URL: ${SPEECH_PUBLIC_URL:-}
      # Contact information (GET /contact)
      CONTACT_NAME: ${CONTACT_NAME:-}
      CONTACT_EMAIL: ${CONTACT_EMAIL:-}
      CONTACT_PHONE: ${CONTACT_PHONE:-}
      CONTACT_WEBSITE: ${CONTACT_WEBSITE:-}
      # Session / cleanup tuning (milliseconds)
      SESSION_TTL: ${SESSION_TTL:-7200000}
      CLEANUP_INTERVAL: ${CLEANUP_INTERVAL:-300000}
      # Revoked key cleanup (days + interval ms)
      REVOKED_KEY_TTL_DAYS: ${REVOKED_KEY_TTL_DAYS:-30}
      REVOKED_KEY_CLEANUP_INTERVAL: ${REVOKED_KEY_CLEANUP_INTERVAL:-86400000}
      # MCP SSE → backend bridge (production + DSK tools)
      LCYT_BACKEND_URL: ${LCYT_BACKEND_URL:-http://localhost:3000}
      LCYT_API_KEY: ${LCYT_API_KEY:-}
      LCYT_ADMIN_KEY: ${LCYT_ADMIN_KEY:-}
      MCP_SESSION_TTL_MS: ${MCP_SESSION_TTL_MS:-7200000}
      # YouTube OAuth (suppresses startup warning if set)
      YOUTUBE_CLIENT_ID: ${YOUTUBE_CLIENT_ID:-}
      # Server public URL (used in generated .env file downloads)
      PUBLIC_URL: ${PUBLIC_URL:-}
    restart: unless-stopped
    volumes:
      - lcyt-db:/data
    healthcheck:
      test: ["CMD", "node", "-e", "const http=require('http');const req=http.get('http://127.0.0.1:3000/health',res=>{process.exit(res.statusCode===200?0:1)});req.on('error',()=>process.exit(1));"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  lcyt-db: {}
