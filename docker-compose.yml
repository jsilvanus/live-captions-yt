version: '3.8'

# ─── Development / single-VM compose ─────────────────────────────────────────
#
# Includes:
#   lcyt-site       — LCYT backend API + MCP SSE server
#   mediamtx        — MediaMTX RTMP/HLS broker (replaces ffmpeg HLS/radio)
#   docker-socket-proxy — secure Docker socket proxy (Phases 2–3 ffmpeg containers)
#
# Quick start:
#   cp .env.example .env   # fill in JWT_SECRET, ADMIN_KEY, etc.
#   docker compose up
#
# To enable RTMP relay + MediaMTX radio:
#   RTMP_RELAY_ACTIVE=1  RADIO_HLS_SOURCE=mediamtx  docker compose up
# ─────────────────────────────────────────────────────────────────────────────

services:
  # LCYT API (3000) and MCP server (3001)
  # (frontend is served as static files separately by nginx)
  lcyt-site:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        RTMP_RELAY_ACTIVE: ${RTMP_RELAY_ACTIVE:-0}
        GRAPHICS_ENABLED: ${GRAPHICS_ENABLED:-0}
        APT_MIRROR: ${APT_MIRROR:-}
    image: lcyt-site:latest
    ports:
      - "127.0.0.1:3000:3000"
      - "127.0.0.1:3001:3001"
    environment:
      RTMP_RELAY_ACTIVE: ${RTMP_RELAY_ACTIVE:-0}
      JWT_SECRET: ${JWT_SECRET}
      DB_PATH: /data/lcyt.sqlite
      FREE_APIKEY_ACTIVE: ${FREE_APIKEY_ACTIVE:-0}
      MCP_REQUIRE_API_KEY: ${MCP_REQUIRE_API_KEY:-0}
      ADMIN_KEY: ${ADMIN_KEY:-}
      ALLOWED_DOMAINS: ${ALLOWED_DOMAINS:-app.lcyt.fi,localhost}
      USAGE_PUBLIC: ${USAGE_PUBLIC:-}
      STATIC_DIR: ${STATIC_DIR:-}
      GRAPHICS_ENABLED: ${GRAPHICS_ENABLED:-0}
      LCYT_WEB_URL: ${LCYT_WEB_URL:-}
      SPEECH_PUBLIC_URL: ${SPEECH_PUBLIC_URL:-}
      # Contact information (GET /contact)
      CONTACT_NAME: ${CONTACT_NAME:-}
      CONTACT_EMAIL: ${CONTACT_EMAIL:-}
      CONTACT_PHONE: ${CONTACT_PHONE:-}
      CONTACT_WEBSITE: ${CONTACT_WEBSITE:-}
      # Session / cleanup tuning (milliseconds)
      SESSION_TTL: ${SESSION_TTL:-7200000}
      CLEANUP_INTERVAL: ${CLEANUP_INTERVAL:-300000}
      # Revoked key cleanup (days + interval ms)
      REVOKED_KEY_TTL_DAYS: ${REVOKED_KEY_TTL_DAYS:-30}
      REVOKED_KEY_CLEANUP_INTERVAL: ${REVOKED_KEY_CLEANUP_INTERVAL:-86400000}
      # MCP SSE → backend bridge (production + DSK tools)
      LCYT_BACKEND_URL: ${LCYT_BACKEND_URL:-http://localhost:3000}
      LCYT_API_KEY: ${LCYT_API_KEY:-}
      LCYT_ADMIN_KEY: ${LCYT_ADMIN_KEY:-}
      MCP_SESSION_TTL_MS: ${MCP_SESSION_TTL_MS:-7200000}
      # YouTube OAuth (suppresses startup warning if set)
      YOUTUBE_CLIENT_ID: ${YOUTUBE_CLIENT_ID:-}
      # Server public URL (used in generated .env file downloads)
      PUBLIC_URL: ${PUBLIC_URL:-}
      # ── Radio HLS source ───────────────────────────────────────────────────
      # Set to 'mediamtx' to let MediaMTX serve HLS directly (no ffmpeg for radio).
      # Requires the mediamtx service below to be running.
      RADIO_HLS_SOURCE: ${RADIO_HLS_SOURCE:-ffmpeg}
      # MediaMTX API URL (for dynamic path management via NginxManager)
      MEDIAMTX_API_URL: ${MEDIAMTX_API_URL:-http://mediamtx:9997}
      MEDIAMTX_HLS_BASE_URL: ${MEDIAMTX_HLS_BASE_URL:-http://mediamtx:8080}
      MEDIAMTX_API_USER: ${MEDIAMTX_API_USER:-}
      MEDIAMTX_API_PASSWORD: ${MEDIAMTX_API_PASSWORD:-}
      # ── nginx config path for radio proxy locations ────────────────────────
      # When set, the backend writes slug-based proxy locations and reloads nginx.
      # Leave empty to serve radio HLS directly from the Node.js backend instead.
      NGINX_RADIO_CONFIG_PATH: ${NGINX_RADIO_CONFIG_PATH:-}
      NGINX_RELOAD_CMD: ${NGINX_RELOAD_CMD:-nginx -s reload}
      # ── ffmpeg runner (Phases 2–3: docker, Phase 4+: worker) ─────────────
      # DSK rendering still uses ffmpeg. For other jobs RADIO_HLS_SOURCE controls it.
      FFMPEG_RUNNER: ${FFMPEG_RUNNER:-spawn}
      FFMPEG_IMAGE: ${FFMPEG_IMAGE:-lcyt-ffmpeg:latest}
      DOCKER_HOST: ${DOCKER_HOST:-}
    depends_on:
      - mediamtx
    restart: unless-stopped
    volumes:
      - lcyt-db:/data
    healthcheck:
      test: ["CMD", "node", "-e", "const http=require('http');const req=http.get('http://127.0.0.1:3000/health',res=>{process.exit(res.statusCode===200?0:1)});req.on('error',()=>process.exit(1));"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # ── MediaMTX — RTMP/HLS broker ─────────────────────────────────────────────
  # Receives RTMP streams (optionally forwarded from nginx-rtmp) and serves:
  #   HLS at      http://mediamtx:8080/<path>/index.m3u8
  #   RTMP at     rtmp://mediamtx:1935/<path>
  #   REST API at http://mediamtx:9997/v3/
  #
  # The backend RadioManager (RADIO_HLS_SOURCE=mediamtx) registers MediaMTX paths
  # via the REST API and writes nginx proxy locations via NginxManager.
  # ffmpeg is NOT used for radio HLS in this mode.
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx
    restart: unless-stopped
    ports:
      - "127.0.0.1:1936:1935"   # RTMP ingest (avoid conflict with local nginx-rtmp :1935)
      - "127.0.0.1:8080:8080"   # HLS / metrics HTTP
      - "127.0.0.1:9997:9997"   # REST API
    volumes:
      - ./docker/mediamtx.yml:/mediamtx.yml:ro
    environment:
      MTX_LOGLEVEL: ${MEDIAMTX_LOG_LEVEL:-info}

  # ── Docker socket proxy (Phases 2–3 only) ──────────────────────────────────
  # Allows the backend to launch ephemeral ffmpeg compute containers without
  # direct root-socket access. Only needed when FFMPEG_RUNNER=docker.
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: docker-socket-proxy
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      CONTAINERS: 1
      POST: 1
      DELETE: 1
    profiles:
      - docker-runner   # opt-in: `docker compose --profile docker-runner up`

volumes:
  lcyt-db: {}

networks:
  default:
    name: lcyt-net
