# ─── LCYT — Kubernetes Secret ────────────────────────────────────────────────
#
# IMPORTANT: Fill in Base64-encoded values before applying.
# Do NOT commit this file with real secrets to version control.
#
# Encode a value:  echo -n 'your-value' | base64
#
# Alternatively, create the secret imperatively and skip this file:
#   kubectl -n lcyt create secret generic lcyt-secrets \
#     --from-literal=JWT_SECRET="$(openssl rand -hex 32)" \
#     --from-literal=ADMIN_KEY="$(openssl rand -hex 16)" \
#     --from-literal=BACKEND_INTERNAL_TOKEN="$(openssl rand -hex 24)"
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: lcyt-secrets
  namespace: lcyt
type: Opaque
data:
  # Required: HS256 signing key for session JWTs
  # Generate: openssl rand -hex 32 | base64
  JWT_SECRET: Y2hhbmdlLW1lLWluLXByb2R1Y3Rpb24=  # "change-me-in-production"

  # Required: Admin endpoint API key (X-Admin-Key header)
  # Generate: openssl rand -hex 16 | base64
  ADMIN_KEY: ""

  # Required for distributed mode (FFMPEG_RUNNER=worker):
  # Shared secret for backend ↔ orchestrator authentication
  # Generate: openssl rand -hex 24 | base64
  BACKEND_INTERNAL_TOKEN: ""

  # Optional: Hetzner Cloud API token (enables burst VM autoscaling in orchestrator)
  HETZNER_API_TOKEN: ""

  # Optional: MediaMTX REST API basic-auth credentials
  MEDIAMTX_API_USER: ""
  MEDIAMTX_API_PASSWORD: ""

  # Optional: Google Cloud STT API key (or use GOOGLE_APPLICATION_CREDENTIALS instead)
  GOOGLE_STT_KEY: ""

  # Optional: OpenAI API key (for OpenAI STT or AI agent features)
  OPENAI_STT_API_KEY: ""

  # Optional: Embedding API key (for semantic cues / AI agent)
  EMBEDDING_API_KEY: ""
