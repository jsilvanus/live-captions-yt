# ─── LCYT — Backend Service ───────────────────────────────────────────────────
#
# ClusterIP service exposing the lcyt-backend API and MCP SSE ports to other
# pods in the cluster. External access is handled by the Ingress (30-ingress.yaml).
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: lcyt-backend
  namespace: lcyt
  labels:
    app.kubernetes.io/name: lcyt-backend
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: lcyt-backend
  ports:
    - name: api
      port: 3000
      targetPort: api
      protocol: TCP
    - name: mcp-sse
      port: 3001
      targetPort: mcp-sse
      protocol: TCP
